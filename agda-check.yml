name: Agda Validation
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Agda
        run: |
          sudo apt-get update
          sudo apt-get install -y agda libtinfo5
      - name: Verify Agda File
        run: agda agdatest.agda
