name: Agda Formal Verification
on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Agda
        uses: wenkokke/setup-agda@v2
        with:
          agda-version: '2.6.4' # Versione stabile

      - name: Cache Agda binaries
        uses: actions/cache@v3
        with:
          path: ~/.agda-lib
          key: ${{ runner.os }}-agda-${{ hashFiles('**/*.agda') }}

      - name: Run Formal Verification
        # Usiamo --sharing per ottimizzare la memoria
        run: agda --sharing source.agda
