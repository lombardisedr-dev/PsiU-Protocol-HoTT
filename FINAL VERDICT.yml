name: "FINAL VERDICT"

on: [push]

jobs:
  total-rigor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Install Pure Agda HoTT Environment"
        uses: agda/setup-agda@v2
        with:
          agda-version: '2.6.4'
          cubical-version: 'latest'

      - name: "CRITICAL AUDIT: No-Tricks Validation"
        # --safe: impedisce postulati, terminazione non provata o errori di tipo.
        # --cubical: attiva l'univalenza computazionale.
        run: |
          agda --cubical --safe Psi_Protocol_implementation_2.agda

      - name: "STRESS-TEST: Canonicity & Normalization"
        # Questo step forza Agda a calcolare la forma normale. 
        # Se il trasporto è bloccato, il compilatore andrà in timeout o darà errore.
        run: |
          agda -c --cubical --safe Psi_Protocol_implementation_2.agda

      - name: "FINAL VERDICT"
        run: echo "Il protocollo PSIU è formalmente certificato al 100%."
