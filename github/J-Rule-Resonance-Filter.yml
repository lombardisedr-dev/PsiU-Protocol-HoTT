name: J-Rule-Resonance-Filter

# Si attiva al push, se carichi dati, o manualmente con il tasto "Play"
on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  resonance-process:
    runs-on: ubuntu-latest
    
    # Permessi necessari per scrivere il risultato nel repository
    permissions:
      contents: write

    steps:
      - name: 1. Estrazione dello Spazio (Checkout)
        uses: actions/checkout@v4

      - name: 2. Configurazione Ambiente R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: 3. Esecuzione Motore di Risonanza (engine.R)
        run: |
          Rscript engine.R

      - name: 4. Cristallizzazione Tautologica (Git Commit & Push)
        run: |
          git config --local user.email "gnomonic-bot@github.com"
          git config --local user.name "Gnomonic-Bot"
          # Aggiunge il file di output se creato dallo script R
          git add output_tautology/resonant_core.csv || echo "Nessun file trovato"
          # Committa solo se ci sono variazioni (nuova verità risonante)
          git commit -m "Trascrizione Tautologica: Cristallizzazione Sn+1 completata" || echo "Nessuna nuova risonanza rilevata"
          git push

