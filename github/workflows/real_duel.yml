name: Real Duel - Trust Benchmark

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  scientific-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Configurazione Ambiente R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true 

      - name: Installazione Librerie Scientifiche
        run: |
          install.packages(c("isotree", "dbscan"), repos="https://r-project.org")
        shell: Rscript {0}

      - name: Esecuzione Duello su Dati Reali
        run: Rscript real_dataset_trust.R

      - name: Archiviazione Risultati
        uses: actions/upload-artifact@v4
        with:
          name: real-trust-results
          path: report_finale.txt
        if: always()
