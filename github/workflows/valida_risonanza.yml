name: Validazione_Risonanza_SST
on: [push]

jobs:
  check-agda:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Agda
        uses: agda/setup-agda@v1
        with:
          agda-version: '2.6.4'
          # Installiamo la libreria cubica, necessaria per la tua risonanza
          libraries: cubical

      - name: Compila Test Verità
        run: |
          agda --cubical --safe Test_Verita_SST.agda
