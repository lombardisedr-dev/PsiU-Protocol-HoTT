name: J-Rule-Filter
on:
  push:
  workflow_dispatch: # Questo abilita il tasto manuale

jobs:
  resonance:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - name: Run Engine
        run: Rscript engine.R
      - name: Commit Crystal
        run: |
          git config --local user.email "bot@github.com"
          git config --local user.name "Gnomonic-Bot"
          git add output_tautology/resonant_core.csv || echo "Nulla"
          git commit -m "Cristallizzazione Sn+1" || echo "Invariato"
          git push
