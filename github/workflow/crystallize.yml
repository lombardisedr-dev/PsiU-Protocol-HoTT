name: J-Rule-Resonance-Filter

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  resonance-process:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Setup R
        uses: r-lib/actions/setup-r@v2

      - name: 3. Esecuzione Motore Risonanza
        run: Rscript engine.R

      - name: 4. Cristallizzazione Risultati
        run: |
          git config --local user.email "bot@github.com"
          git config --local user.name "Gnomonic-Bot"
          git add output_tautology/resonant_core.csv || echo "Nessun file"
          git commit -m "Trascrizione Tautologica Sn+1" || echo "Nessuna variazione"
          git push
