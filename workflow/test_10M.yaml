name: PSI-U Engine 2.0 Validation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  engine-performance-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup R Environment
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.2.0'

      - name: Install Core Dependencies
        run: |
          install.packages(c("Rcpp", "RcppArmadillo"))
        shell: Rscript {0}

      - name: Run 10M Stress Test & Efficiency Check
        run: |
          # Caricamento motore
          if (!file.exists("engine_2.0.R")) stop("File engine_2.0.R non trovato!")
          source("engine_2.0.R")
          
          # 1. Generazione Dataset Massivo (10.000.000 records)
          set.seed(1306)
          massive_data <- c(
            rnorm(6000000, mean = 50, sd = 2),   # Risonanza Pura
            rnorm(2000000, mean = 58, sd = 2),   # Deriva Termica (Anomala)
            runif(2000000, min = 0, max = 100)   # Entropia/Caos (Anomala)
          )
          
          # 2. Esecuzione Benchmark
          res <- PsiU_Engine_2.0(massive_data, block_size = 50000)
          
          # 3. Validazione Parametri Critici
          THROUGHPUT_MIN <- 8000000
          EXPECTED_PRUNED <- 80
          
          cat("\n--- ANALISI INTEGRITÀ PSI-U ---\n")
          
          # Test Accuratezza (Rami Recisi)
          if(res$pruned != EXPECTED_PRUNED) {
            cat("ERRORE: Precisione Gnomonica fallita.\n")
            cat("Rilevati:", res$pruned, "rami | Attesi:", EXPECTED_PRUNED, "\n")
            quit(status = 1)
          }
          
          # Test Efficienza (Throughput)
          if(res$efficiency < THROUGHPUT_MIN) {
            cat("ERRORE: Degradazione Performance rilevata.\n")
            cat("Current:", round(res$efficiency, 0), "rec/sec | Target:", THROUGHPUT_MIN, "\n")
            quit(status = 1)
          }
          
          cat("STATUS: SUCCESS. L'architettura è in equilibrio omeostatico.\n")
        shell: Rscript {0}
