name: Proof

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  proof:
    name: Validazione Matematica Rigorosa (HoTT / SST)
    runs-on: ubuntu-latest

    steps:
      - name: 1. Clonazione Repository
        uses: actions/checkout@v4

      - name: 2. Installazione Ufficiale Agda e Standard Library
        uses: agda/agda-setup-action@v2
        with:
          agda-version: '2.6.4.3'
          agda-stdlib-version: '2.0'

      - name: 3. Controllo Statico Costruttivo (Anti-Postulate)
        run: |
          echo "=== VERIFICA RIGORE: Analisi Statica del Codice ==="
          ERRORS=0
          
          if grep -rn "postulate" *.agda; then
            echo "❌ ERRORE CRITICO: Il codice usa postulati non dimostrati."
            ERRORS=$((ERRORS + 1))
          fi
          
          if grep -rn "{-# TERMINATING" *.agda || grep -rn "{-# NON_TERMINATING" *.agda; then
            echo "❌ ERRORE CRITICO: Rilevato bypass del controllo di terminazione."
            ERRORS=$((ERRORS + 1))
          fi

          if [ $ERRORS -ne 0 ]; then
            exit 1
          else
            echo "✅ SUPERATO: Il codice non contiene assiomi vuoti o scorciatoie."
          fi

      - name: 4. Type-Checking Cubico Certificato (--safe)
        run: |
          echo "=== VERIFICA MATEMATICA: Avvio del Compilatore Agda ==="
          # Esegue il controllo puro. Il file .agda-lib locale indicherà ad Agda
          # di agganciarsi alla standard-library ufficiale configurata dall'azione al punto 2.
          agda --safe Psi_Protocol_implementation.agda
