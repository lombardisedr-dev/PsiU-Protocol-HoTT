name: Proof

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  proof:
    name: Verifica Formale e Ispezione Assiomatica
    runs-on: ubuntu-latest

    steps:
      - name: 1. Clonazione Repository
        uses: actions/checkout@v4

      - name: 2. Installazione di Agda e Configurazione Ambiente Locale
        run: |
          echo "=== Installazione pacchetti di sistema ==="
          sudo apt-get update
          sudo apt-get install -y agda

          echo "=== Creazione e mappatura delle cartelle ==="
          mkdir -p ~/.agda
          
          # Creiamo un file .agda-lib locale finto e vuoto per soddisfare il compilatore
          # senza dover scaricare centinaia di megabyte da repository esterni instabili
          mkdir -p ~/agda-local-lib
          echo "name: standard-library" > ~/agda-local-lib/standard-library.agda-lib
          
          # Registriamo la libreria finta nell'ambiente globale del runner
          echo "$HOME/agda-local-lib/standard-library.agda-lib" > ~/.agda/libraries
          echo "standard-library" > ~/.agda/defaults
          
          echo "✅ Ambiente isolato configurato con successo."

      - name: 3. Controllo Anti-Scorciatoie (Linting Sintattico)
        run: |
          echo "=== LIVELLO 1: Controllo stringente sulle stringhe vietate ==="
          ERRORS=0
          
          if grep -rn "postulate" *.agda; then
            echo "❌ ERRORE: Rilevato l'uso di 'postulate'. Le dimostrazioni devono essere costruttive."
            ERRORS=$((ERRORS + 1))
          fi
          
          if grep -rn "{-# TERMINATING" *.agda || grep -rn "{-# NON_TERMINATING" *.agda; then
            echo "❌ ERRORE: Rilevata disattivazione manuale del controllo di terminazione."
            ERRORS=$((ERRORS + 1))
          fi

          if [ $ERRORS -ne 0 ]; then
            exit 1
          else
            echo "✅ Superato: Nessuna scorciatoia sintattica rilevata."
          fi

      - name: 4. Compilazione e Type-Checking Rigido (--safe)
        run: |
          echo "=== LIVELLO 2: Controllo dei Tipi in Modalità Sicura Costruttiva ==="
          # Eseguiamo il controllo formale reale sul tuo file sorgente
          agda --safe Psi_Protocol_implementation.agda
          echo "✅ IDONEITÀ FORMALE: Dimostrazione completata con successo al 100%."
