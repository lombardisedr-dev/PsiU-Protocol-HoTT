name: Proof

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  proof:
    name: Validazione Matematica Rigorosa (HoTT / SST)
    runs-on: ubuntu-latest

    steps:
      - name: 1. Clonazione Repository
        uses: actions/checkout@v4

      - name: 2. Installazione di Agda e dei Sorgenti di Sistema
        run: |
          echo "=== Installazione di Agda ==="
          sudo apt-get update
          sudo apt-get install -y agda agda-stdlib

      - name: 3. Controllo Assenza di Assiomi Arbitrari (Anti-Postulate)
        run: |
          echo "=== VERIFICA RIGORE: Analisi Statica del Codice ==="
          ERRORS=0
          
          if grep -rn "postulate" *.agda; then
            echo "❌ ERRORE CRITICO: Il codice usa postulati non dimostrati. Validazione fallita."
            ERRORS=$((ERRORS + 1))
          fi
          
          if grep -rn "{-# TERMINATING" *.agda || grep -rn "{-# NON_TERMINATING" *.agda; then
            echo "❌ ERRORE CRITICO: Rilevato bypass del controllo di terminazione."
            ERRORS=$((ERRORS + 1))
          fi

          if [ $ERRORS -ne 0 ]; then
            exit 1
          else
            echo "✅ SUPERATO: Il codice è costruttivo al 100% (nessun assioma vuoto)."
          fi

      - name: 4. Type-Checking Cubico Certificato (--safe)
        run: |
          echo "=== VERIFICA MATEMATICA: Avvio del Compilatore Agda ==="
          # Utilizziamo il flag standard '-i' per indicare al compilatore dove si trovano i sorgenti
          # della libreria standard installata stabilmente da Ubuntu (/usr/share/agda-stdlib/src/).
          agda --safe -i . -i /usr/share/agda-stdlib/src/ Psi_Protocol_implementation.agda
