name: Proof

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  proof:
    name: Validazione Matematica Rigorosa (HoTT / SST)
    runs-on: ubuntu-latest

    steps:
      - name: 1. Clonazione Repository
        uses: actions/checkout@v4

      - name: 2. Installazione di Agda Puro
        run: |
          sudo apt-get update
          sudo apt-get install -y agda

      - name: 3. Type-Checking Cubico Puro Autonomo (--safe)
        run: |
          agda --safe --no-libraries Psi_Protocol_implementation.agda
          echo "========================================================="
          echo "🎉 VITTORIA LOGICA: DIMOSTRAZIONE FORMALE VALIDA AL 100% 🎉"
          echo "========================================================="
