name: Proof

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  proof:
    name: Validazione Matematica Rigorosa (HoTT / SST)
    runs-on: ubuntu-latest

    steps:
      - name: 1. Clonazione Repository
        uses: actions/checkout@v4

      - name: 2. Installazione di Agda Puro
        run: |
          sudo apt-get update
          sudo apt-get install -y agda

      - name: 3. Controllo Assenza di Assiomi Arbitrari (Anti-Postulate)
        run: |
          echo "=== VERIFICA RIGORE: Analisi Statica del Codice ==="
          ERRORS=0
          
          if grep -rn "postulate" *.agda; then
            echo "❌ ERRORE CRITICO: Il codice usa postulati non dimostrati."
            ERRORS=$((ERRORS + 1))
          fi
          
          if grep -rn "{-# TERMINATING" *.agda || grep -rn "{-# NON_TERMINATING" *.agda; then
            echo "❌ ERRORE CRITICO: Rilevato bypass del controllo di terminazione."
            ERRORS=$((ERRORS + 1))
          fi

          if [ $ERRORS -ne 0 ]; then
            exit 1
          else
            echo "✅ SUPERATO: Il codice non contiene assiomi vuoti o scorciatoie."
          fi

      - name: 4. Type-Checking Cubico Puro Autonomo (--safe)
        run: |
          echo "=== VERIFICA MATEMATICA: Avvio del Compilatore Agda ==="
          agda --safe --no-libraries Psi_Protocol_implementation.agda
          
          echo "========================================================="
          echo "🎉 VITTORIA LOGICA: DIMOSTRAZIONE FORMALE VALIDA AL 100% 🎉"
          echo "========================================================="
