name: Proof

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  proof:
    name: Validazione Matematica Rigorosa (HoTT / SST)
    runs-on: ubuntu-latest

    steps:
      - name: 1. Clonazione Repository
        uses: actions/checkout@v4

      - name: 2. Installazione di Agda Puro
        run: |
          sudo apt-get update
          sudo apt-get install -y agda

      - name: 3. Controllo Assenza di Assiomi Arbitrari (Anti-Postulate)
        run: |
          ERRORS=0
          if grep -rn "postulate" *.agda; then
            echo "❌ ERRORE: Il codice usa postulati non dimostrati."
            exit 1
          fi
          if grep -rn "{-# TERMINATING" *.agda || grep -rn "{-# NON_TERMINATING" *.agda; then
            echo "❌ ERRORE: Rilevato bypass del controllo di terminazione."
            exit 1
          fi

      - name: 4. Type-Checking Cubico Puro (--safe)
        run: |
          # Compilazione diretta senza flag di libreria, perché il file è autosufficiente
          agda --safe Psi_Protocol_implementation.agda
          echo "========================================================="
          echo "🎉 VITTORIA LOGICA: DIMOSTRAZIONE FORMALE VALIDA AL 100% 🎉"
          echo "========================================================="
