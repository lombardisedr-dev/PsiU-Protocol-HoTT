name: PsiU Scientific Validator

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Permette di lanciarlo a mano dalla scheda Actions

jobs:
  build-and-certify:
    runs-on: ubuntu-latest
    # Permessi necessari per permettere al bot di scrivere i file nel repository
    permissions:
      contents: write
    
    steps:
      - name: 1. Accesso al Repository
        uses: actions/checkout@v3

      - name: 2. Setup Ambiente R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: 3. Installazione Librerie Scientifiche
        run: |
          Rscript -e 'install.packages(c("ggplot2", "pracma"))'

      - name: 4. Generazione Evidenze e Certificato
        # Esegue prima il motore, poi il grafico e infine il certificato
        run: |
          Rscript -e 'source("PsiU-Protocol ADVANCED IMPLEMENTATION.R")'
          Rscript PsiU_Generate_Validation_Plot.R
          Rscript PsiU_Generate_Formal_Certificate.R

      - name: 5. Pubblicazione Artifacts (PNG e TXT)
        run: |
          git config --global user.name "PsiU-Validator-Bot"
          git config --global user.email "bot@psiu-protocol.org"
          # Aggiunge tutti i file generati
          git add PsiU_HoTT_Scientific_Validation_UCI.png
          git add PsiU_Formal_Scientific_Certificate.png
          git add PsiU_Validation_Audit_Report.txt
          # Esegue il commit e carica sul server
          git commit -m "Certificazione Ufficiale Emessa [Skip CI]" || echo "Nessuna modifica rilevata"
          git push
