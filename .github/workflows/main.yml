name: "PsiU Protocol: Gnomonic Resonance & Tautological Extraction"

# Esegue il motore a ogni push o manualmente dalla tab Actions
on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Permessi necessari per salvare i "Cristalli" nel repository
permissions:
  contents: write

jobs:
  crystallization-process:
    name: "Crystallizing Harmonic Nucleus"
    runs-on: ubuntu-latest
    
    steps:
      - name: "Step 1: Environment Synchronization"
        uses: actions/checkout@v4

      - name: "Step 2: Deploying R-Language Environment"
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: "Step 3: Integrating Mathematical Libraries"
        run: Rscript -e 'install.packages("ggplot2")'

      - name: "Step 4: Executing Gnomonic Resonance Sieve"
        run: Rscript phi_engine.R

      - name: "Step 5: Archiving Tautological Results"
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "PsiU-Bot"
          git add output_tautology/*
          git commit -m "Crystallization: New harmonic core extracted [skip ci]" || echo "No changes detected"
          git push
