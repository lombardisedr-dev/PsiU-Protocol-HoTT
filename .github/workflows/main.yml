name: Run-PsiU-Engine-Visual
on: [push, workflow_dispatch]

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Graphics Dependencies
        # Questo comando installa i "driver" necessari per generare immagini su Linux
        run: |
          sudo apt-get update
          sudo apt-get install -y libpng-dev libjpeg-dev libtiff-dev libxml2-dev libssl-dev libcurl4-openssl-dev

      - name: Setup R Environment
        uses: r-lib/actions/setup-r@v2

      - name: Execute Engine
        # Qui viene lanciato il motore originale senza toccare la logica
        run: Rscript engine.R

      - name: Collect All Artifacts (CSV and PNG)
        # Questo passaggio crea lo ZIP con i tuoi grafici e i tuoi dati
        uses: actions/upload-artifact@v4
        with:
          name: PsiU-Protocol-Results
          path: |
            *.csv
            *.png
            *.pdf
          if-no-files-found: warn

      - name: Auto-Commit Results
        # Questo salva i file CSV direttamente nella tua cartella 'Code'
        run: |
          git config --global user.name "PsiU-Bot"
          git config --global user.email "bot@psiu.com"
          git add *.csv
          git commit -m "Update: Protocol Resonance Analysis" || echo "No changes to commit"
          git push
