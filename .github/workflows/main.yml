name: PsiU Scientific Validator

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build-and-plot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup R Environment
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install Dependencies
        run: |
          Rscript -e 'install.packages("ggplot2")'

      - name: Execute PsiU Protocol & Generate Plot
        # Esegue in sequenza: Motore Avanzato + Generatore Grafico
        run: |
          Rscript -e 'source("PsiU-Protocol ADVANCED IMPLEMENTATION.R")'
          Rscript PsiU_Generate_Validation_Plot.R

      - name: Commit and Push Validation Artifacts
        run: |
          git config --global user.name "PsiU-Validator-Bot"
          git config --global user.email "bot@psiu-protocol.org"
          git add PsiU_HoTT_Scientific_Validation_UCI.png
          git commit -m "Auto-Generation: Scientific Evidence Artifact [Skip CI]" || echo "No changes to commit"
          git push
