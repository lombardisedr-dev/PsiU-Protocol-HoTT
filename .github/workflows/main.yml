name: PsiU-Action
on: [push]
permissions:
  contents: write
jobs:
  run-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - run: Rscript -e 'install.packages("ggplot2")'
      - run: Rscript phi_engine.R
      - name: Save Results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add output_tautology/*
          git commit -m "New crystallization [skip ci]" || echo "No changes"
          git push
