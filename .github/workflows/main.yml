name: Run-PsiU-Engine
on: [push, workflow_dispatch]
jobs:
  run-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - name: Execute Engine
        run: Rscript engine.R
      - name: Export CSVs
        uses: actions/upload-artifact@v4
        with:
          name: protocol-outputs
          path: results_*.csv
