name: Run-PsiU-Engine-And-Commit
on: [push, workflow_dispatch]

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      
      - name: Execute Smart City Test
        run: Rscript "Smart City Focus_Test.R"
        
      - name: Execute General Engine
        run: Rscript engine.R
        
      - name: Upload Results as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: protocol-outputs
          path: "*.csv"
