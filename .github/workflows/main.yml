name: Run-PsiU-Visual-Engine
on: [push, workflow_dispatch]

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Execute Engine and Generate Plot
        run: Rscript engine.R

      - name: Upload Results and Map
        uses: actions/upload-artifact@v4
        with:
          name: protocol-outputs-visual
          path: |
            *.csv
            *.png
          if-no-files-found: error

      - name: Commit Results to Repository
        run: |
          git config --global user.name "PsiU-Bot"
          git config --global user.email "bot@psiu.com"
          git add *.csv
          git commit -m "Auto-update: Analysis and Resonance Map" || echo "No changes to commit"
          git push

