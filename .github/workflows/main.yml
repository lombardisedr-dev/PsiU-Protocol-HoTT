name: PsiU Scientific Validator

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build-and-plot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install Libs
        run: Rscript -e 'install.packages(c("ggplot2", "pracma"))'

      - name: Generate Artifacts
        run: Rscript PsiU_Generate_Validation_Plot.R

      - name: Push Results
        run: |
          git config --global user.name "PsiU-Validator-Bot"
          git config --global user.email "bot@psiu-protocol.org"
          git add PsiU_HoTT_Scientific_Validation_UCI.png
          git add PsiU_Validation_Audit_Report.txt
          git commit -m "Fix: Generated Scientific Artifacts [Skip CI]" || echo "No changes"
          git push
