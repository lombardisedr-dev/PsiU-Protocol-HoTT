name: PSIU Protocol Automation

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup R Environment
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install System Dependencies
        run: |
          Rscript -e 'install.packages("ggplot2", repos = "https://posit.co")'

      - name: Execute PsiU Validation Plot
        run: Rscript PsiU_Generate_Validation_Plot.R

      - name: Force Commit and Push to Repository
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@://github.com"
          
          git fetch origin main
          git checkout main
          
          git add -f psi_u_validation_plot.png
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: aggiornamento automatico plot di validazione omotopica [skip ci]"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@://github.com{{ github.repository }}.git main
          else
            echo "Nessuna variazione rilevata nel grafico."
          fi

          
    
