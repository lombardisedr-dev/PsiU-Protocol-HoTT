name: PSIU Protocol - Final Scientific Certification

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  execute-protocol:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up R Environment
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install Dependencies
        run: |
          Rscript -e 'install.packages("ggplot2")'
          # Rscript -e 'devtools::install_github("lombardisedr-dev/PsiUEngineRL")' # Decommenta se serve l'engine remoto

      - name: Run PsiU Protocol Engine
        run: |
          if [ -f PsiU_Protocol_Engine.R ]; then Rscript PsiU_Protocol_Engine.R; else echo "PsiU_Protocol_Engine.R non trovato, salto lo step."; fi

      - name: Generate Validation Plot
        run: Rscript PsiU_Generate_Validation_Plot.R

