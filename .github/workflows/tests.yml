name: PSIU Protocol Automation

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Attiva il pulsante per l'avvio manuale

jobs:
  run-protocol-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup R Environment
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install System Dependencies
        run: |
          Rscript -e 'install.packages("ggplot2", repos="https://r-project.org")'

      - name: Execute PsiU Validation Plot
        run: Rscript PsiU_Generate_Validation_Plot.R
