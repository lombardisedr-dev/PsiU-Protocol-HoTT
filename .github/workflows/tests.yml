name: PSIU Protocol Automation

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup R Environment
        uses: r-lib/actions/setup-r@v2

      - name: Install System Dependencies
        run: |
          Rscript -e 'install.packages("ggplot2", repos = "https://cloud.r-project.org")'

      - name: Execute PsiU Validation Plot
        run: |
          if [ -f PsiU_Generate_Validation_Plot.R ]; then
            Rscript PsiU_Generate_Validation_Plot.R
          else
            echo "Errore: PsiU_Generate_Validation_Plot.R non trovato nella radice."
            exit 1
          fi

      - name: Force Commit and Push to Repository
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@://github.com"
          
          git fetch origin main
          git checkout main
          
          if [ -f psi_u_validation_plot.png ]; then
            git add -f psi_u_validation_plot.png
            if ! git diff --cached --quiet; then
              git commit -m "chore: aggiornamento automatico plot di validazione omotopica [skip ci]"
              git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@://github.com{{ github.repository }}.git main
            else
              echo "Nessuna variazione rilevata nel grafico."
            fi
          else
            echo "Errore: L'immagine psi_u_validation_plot.png non è stata generata dallo script R."
            exit 1
          fi

