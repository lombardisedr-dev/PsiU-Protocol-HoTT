name: PSIU Protocol Automation

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Recupera l'intera cronologia per evitare conflitti di push

      - name: Setup R Environment
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install System Dependencies
        run: |
          Rscript -e 'install.packages("ggplot2", repos = "https://posit.co")'

      - name: Execute PsiU Validation Plot
        run: Rscript PsiU_Generate_Validation_Plot.R

      - name: Force Commit and Push to Repository
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          # Sincronizza lo stato locale con il server per evitare disallineamenti
          git fetch origin main
          git checkout main
          
          # Forza l'aggiunta fisica dell'artifact grafico
          git add -f psi_u_validation_plot.png
          
          # Crea il commit solo se il file è stato effettivamente modificato o creato
          if ! git diff --cached --quiet; then
            git commit -m "chore: aggiornamento automatico plot di validazione omotopica [skip ci]"
            # Utilizza il token nativo della Action per bypassare i blocchi di scrittura remoti
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@://github.com{{ github.repository }}.git main
          else
            echo "Nessuna variazione geometrica rilevata nel grafico cartesiano."
          fi
