name: Agda Check
on: [push, pull_request]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: agda/setup-agda@v1
        with:
          agda-version: '2.6.4' # O la versione più recente
      - name: Run Agda
        run: agda Psi_Protocol_implementation_2.agda
