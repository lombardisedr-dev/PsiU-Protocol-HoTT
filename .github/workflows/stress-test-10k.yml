name: "Stress Test Estremo PSIU (n=10000)"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  agda-extreme-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Agda
        uses: wenkokke/setup-agda@v2
        with:
          agda-version: '2.6.4'

      - name: Install Cubical Library
        run: |
          git clone https://github.com ~/agda-cubical
          mkdir -p ~/.agda
          echo "~/agda-cubical/cubical.agda-lib" > ~/.agda/libraries

      - name: Verifica Base del Protocollo
        run: |
          agda --cubical --safe Psi_Protocol_implementation.agda

      - name: Stress Test di Coerenza (n=10000)
        run: |
          echo "module StressTest10k where" > Stress10k.agda
          echo "open import Psi_Protocol_implementation" >> Stress10k.agda
          echo "test : LivelloCoerenza 10000" >> Stress10k.agda
          echo "test = PSIU-Inductive-Hierarchy 10000" >> Stress10k.agda
          
          # Lancio della verifica formale estrema
          agda --cubical --safe Stress10k.agda
