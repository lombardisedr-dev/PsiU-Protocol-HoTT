name: compile
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      # Installa Agda e scarica in automatico la libreria cubica ufficiale accoppiata
      - name: Installa Agda e Cubical
        uses: wenkokke/setup-agda@v2
        with:
          agda-version: "2.6.4.3"
          agda-libraries: |
            https://github.com

      # Esegue il controllo dei tipi (Type-Check) sul tuo protocollo
      - name: Verifica Tipo (Type-Check)
        run: |
          agda --cubical Psi_Protocol_implementation.agda
