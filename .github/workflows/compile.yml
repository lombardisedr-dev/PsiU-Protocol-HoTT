name: compile
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      # L'unica Action ufficiale approvata e mantenuta dal team di Agda
      - name: Setup Agda
        uses: agda/setup-action@v1
        with:
          agda-version: "2.6.4"

      # Scarica la libreria Cubical ufficiale in modo esplicito
      - name: Scarica la libreria Cubical
        run: |
          git clone --depth 1 --branch v0.6 https://github.com $HOME/cubical

      # Registra i percorsi per il compilatore nativo
      - name: Configura librerie Agda
        run: |
          mkdir -p $HOME/.agda
          echo "$HOME/cubical/cubical.agda-lib" >> $HOME/.agda/libraries
          echo "cubical" >> $HOME/.agda/defaults

      # Esegue il controllo dei tipi (Type-Check) sul tuo protocollo
      - name: Verifica Tipo (Type-Check)
        run: |
          agda --cubical Psi_Protocol_implementation.agda
