name: compile
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      # L'unica Action ufficiale per configurare Agda e la libreria Cubical in un colpo solo
      - name: Setup Agda & Cubical
        uses: wenkokke/setup-agda-action@v0.2.1
        with:
          agda-version: "2.6.4"
          # Specifichiamo la libreria cubica ufficiale tramite la sintassi nativa dell'Action
          agda-libraries: |
            cubical

      # Esegue il controllo dei tipi (Type-Check) sul tuo protocollo omotopico
      - name: Verifica Tipo (Type-Check)
        run: |
          agda --cubical Psi_Protocol_implementation.agda
