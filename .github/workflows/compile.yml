name: compile
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      # 1. Installa Agda in modo nativo e sicuro tramite l'Action ufficiale della comunità
      - name: Installa Agda
        uses: wenkokke/setup-agda@v2
        with:
          agda-version: "2.6.4.3"

      # 2. Scarica la libreria Cubical ufficiale richiesta dalla HoTT
      - name: Scarica la libreria Cubical
        run: |
          git clone https://github.com $HOME/cubical
          cd $HOME/cubical
          git checkout v0.6

      # 3. Registra i percorsi nei file di configurazione locali
      - name: Configura librerie Agda
        run: |
          mkdir -p $HOME/.agda
          echo "$HOME/cubical/cubical.agda-lib" >> $HOME/.agda/libraries
          echo "cubical" >> $HOME/.agda/defaults

      # 4. Esegue il controllo dei tipi (Type-Check) sul tuo protocollo
      - name: Verifica Tipo (Type-Check)
        run: |
          agda --cubical Psi_Protocol_implementation.agda
