name: compile
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Usiamo l'immagine Docker ufficiale mantenuta dalla comunità di Agda
    container:
      image: agda/cubical:v2.7.0
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Verifica Tipo (Type-Check)
        run: |
          agda --cubical Psi_Protocol_implementation.agda
