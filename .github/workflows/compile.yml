name: compile
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      # Installa Agda e scarica la libreria cubica nativamente senza script manuali
      - name: Setup Agda e Librerie
        uses: agda/agda-setup-action@v1
        with:
          agda-version: '2.6.4.3'
          libraries: |
            cubical
            
      # Esegue il controllo dei tipi (Type-Check) sul tuo protocollo
      - name: Verifica Tipo (Type-Check)
        run: |
          agda --cubical Psi_Protocol_implementation.agda
