name: "PsiU: Topological Invariance"

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  topology-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install Dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::testthat
            any::remotes

      - name: Install PsiUEngineRL (Local)
        run: R CMD INSTALL .

      - name: Run Topological Validation
        shell: Rscript {0}
        run: |
          # Forza il caricamento specifico
          library(testthat)
          library(PsiUEngineRL)
          source("topological_invariance_test.R")
