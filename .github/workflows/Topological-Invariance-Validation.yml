name: "PsiU: Topological Invariance"

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  topology-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install Dependencies
        run: |
          install.packages(c("testthat", "remotes"), repos = "https://r-project.org")
        shell: Rscript {0}

      - name: Install PsiUEngineRL (Local Build)
        run: R CMD INSTALL .

      - name: Run Topological Validation
        shell: Rscript {0}
        run: |
          # Carichiamo lo script che valida la capacità del motore 
          # di distinguere l'ordine (G-Ratio) dal caos (Rumore 0.08)
          source("topological_invariance_test.R")
