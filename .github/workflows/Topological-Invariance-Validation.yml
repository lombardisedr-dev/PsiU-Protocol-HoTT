name: "PsiU: Topological Invariance"

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  topology-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev # Necessario per installare pacchetti R

      - name: Install testthat
        shell: Rscript {0}
        run: |
          # Installiamo testthat nel percorso di libreria predefinito del sistema
          install.packages("testthat", repos = "https://r-project.org")

      - name: Install PsiUEngineRL (Local Build)
        run: |
          # Installa il pacchetto locale pubblicato il 7 giugno
          R CMD INSTALL .

      - name: Run Topological Validation
        shell: Rscript {0}
        run: |
          # Assicuriamoci che la libreria testthat sia visibile
          library(testthat)
          source("topological_invariance_test.R")
