name: Validazione Scientifica Gnomonic Ratio

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: 

jobs:
  execute-gnomonic-audit:
    runs-on: ubuntu-latest

    steps:
    # 1. Scarica il codice dal tuo repository
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Configura l'ambiente R ufficiale
    - name: Configura l'ambiente R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: 'release'

    # 3. Installa il pacchetto dai server predefiniti di GitHub Actions
    - name: Installazione PsiUEngineRL
      run: |
        install.packages("PsiUEngineRL")
      shell: Rscript {0}

    # 4. Esegue l'Audit Principale (BOX e NOISE)
    - name: Esecuzione Audit Principale (BOX & NOISE)
      run: |
        source("gnomonic_ratio_validation.R")
      shell: Rscript {0}

    # 5. Esegue il secondo Audit (DIAMOND)
    - name: Esecuzione Audit Mirato (DIAMOND)
      run: |
        source("diamond_ratio validation.R")
      shell: Rscript {0}

    # 6. Esegue il terzo Audit (Stress Test dei confini al milionesimo)
    - name: Esecuzione Stress Test Confini
      run: |
        source("gnomonic_boundary_stress.R")
      shell: Rscript {0}
