name: Validazione Scientifica Totale (Agda + HoTT)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  comprehensive-check:
    name: Verifica Formale e Ispezione Assiomatica
    runs-on: ubuntu-latest

    steps:
      - name: 1. Clonazione Repository
        uses: actions/checkout@v4

      - name: 2. Installazione di Agda e Standard Library
        run: |
          echo "=== Installazione pacchetti di sistema ==="
          sudo apt-get update
          sudo apt-get install -y agda wget unzip

          echo "=== Configurazione dell'ambiente Agda ==="
          mkdir -p ~/.agda
          mkdir -p ~/agda-libs

          echo "=== Download della Standard Library ufficiale ==="
          # Scarica la versione stabile 2.0 della Standard Library da GitHub
          wget https://github.com -O ~/agda-libs/stdlib.zip
          unzip ~/agda-libs/stdlib.zip -d ~/agda-libs/
          
          # Individua dinamicamente il percorso del file .agda-lib e lo mappa nelle preferenze
          STDLIB_PATH=$(find ~/agda-libs -name "standard-library.agda-lib" | head -n 1)
          echo "$STDLIB_PATH" > ~/.agda/libraries
          echo "standard-library" > ~/.agda/defaults
          
          echo "✅ Libreria standard configurata correttamente in: $STDLIB_PATH"

      - name: 3. Controllo Anti-Scorciatoie (Linting Sintattico)
        run: |
          echo "=== LIVELLO 1: Controllo stringente sulle stringhe vietate ==="
          ERRORS=0
          
          # Cerca se sono stati usati postulati non dimostrati
          if grep -rn "postulate" *.agda; then
            echo "❌ ERRORE: Rilevato l'uso di 'postulate'. Le dimostrazioni devono essere costruttive."
            ERRORS=$((ERRORS + 1))
          fi
          
          # Cerca se sono state usate direttive per disattivare i controlli di terminazione
          if grep -rn "{-# TERMINATING" *.agda || grep -rn "{-# NON_TERMINATING" *.agda; then
            echo "❌ ERRORE: Rilevata disattivazione manuale del controllo di terminazione."
            ERRORS=$((ERRORS + 1))
          fi

          if [ $ERRORS -ne 0 ]; then
            exit 1
          else
            echo "✅ Superato: Nessuna scorciatoia sintattica rilevata."
          fi

      - name: 4. Compilazione e Type-Checking Rigido (--safe)
        run: |
          echo "=== LIVELLO 2: Controllo dei Tipi in Modalità Sicura Costruttiva ==="
          
          # Il flag --safe costringe il compilatore a verificare che:
          # - Non ci siano postulati non dichiarati
          # - Tutte le funzioni siano totalmente dimostrate e terminino correttamente
          # - Non vengano usati paradossi logici sulla gerarchia degli universi
          agda --safe Psi_Protocol_implementation.agda

      - name: 5. Generazione Report Scientifico Interno
        if: success()
        run: |
          echo "=== LIVELLO 3: Analisi di Copertura ed Esportazione Interfaccia ==="
          # Genera la documentazione ipertestuale per ispezionare visivamente ogni tipo/teorema risolto
          agda --html Psi_Protocol_implementation.agda
          echo "✅ Verifica formale completata con successo al 100%."
