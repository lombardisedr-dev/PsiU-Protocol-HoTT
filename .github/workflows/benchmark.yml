name: PsiU-Protocol Rigorous Benchmark Duel

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'README.md' # Previene il loop infinito di auto-push
  pull_request:
    branches: [ main, master ]
    paths-ignore:
      - 'README.md'

permissions:
  contents: write

jobs:
  run-benchmark:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Native R
      run: |
        sudo apt-get update && sudo apt-get install -y r-base-core

    - name: Execute Scientific Duel Script
      run: |
        Rscript run_scientific_duel.R

    - name: Commit and Push Dynamic README Updates
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add README.md
        git diff-index --quiet HEAD || git commit -m "docs: aggiornati dati di benchmark reali nel README [Bot]"
        git push
