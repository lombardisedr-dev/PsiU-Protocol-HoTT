name: PsiU-Protocol Rigorous Benchmark Duel

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Permessi necessari per consentire alla Action di aggiornare il README
permissions:
  contents: write

jobs:
  run-benchmark:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup R Environment
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: '4.3.0'

    - name: Execute Scientific Duel Script
      run: |
        Rscript run_scientific_duel.R

    # Nuovo passo automatico per fare il commit e spingere i risultati nel README
    - name: Commit and Push Dynamic README Updates
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        git add README.md
        git diff-index --quiet HEAD || git commit -m "docs: aggiornati dati di benchmark reali nel README [Bot]"
        git push
