name: PsiU-Protocol Rigorous Benchmark Duel

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  run-benchmark:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup R Environment
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: '4.3.0'

    - name: Execute Scientific Duel Script
      run: |
        Rscript run_scientific_duel.R

    - name: Publish PsiU Engine Artifacts Package
      uses: actions/upload-artifact@v4
      with:
        name: PsiU-Core-Artifacts-Package
        path: |
          PsiU_Protocol_Engine.R
          psi_u_resonance_map.png
        retention-days: 7
