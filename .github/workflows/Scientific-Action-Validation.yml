         name: "PsiU: Gnomonic Speed Check"

on: [push, pull_request]

jobs:
  speed-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::microbenchmark
            any::testthat

      - name: "Run Gnomonic Check"
        shell: Rscript {0}
        run: |
          source("gnomonic_check.R")
          # points_per_second deve essere calcolato dentro gnomonic_check.R
          if (points_per_second < 10000) {
            stop("Performance Degradation: Throughput insufficient")
          }
