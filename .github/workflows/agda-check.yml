name: PSIU-Protocol-Validation

on: 
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate-hott:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout del Codice
        uses: actions/checkout@v4

      - name: 2. Setup Agda e Standard Library (Certificato)
        uses: wenkokke/setup-agda@v2
        with:
          agda-version: '2.6.4.3'
          agda-stdlib-version: '2.0'

      - name: 3. Verifica Formale PSIU (No Postulates, No Noise)
        run: |
          # --safe: Proibisce 'postulate' e 'admit'. Forza la prova totale.
          # --without-K: Necessario per la J-rule e la Homotopy Type Theory.
          # Se il file PSIU_Protocol.agda è corretto, avremo il GREEN TICK.
          agda --safe --without-K PSIU_Protocol.agda
