name: Agda Formal Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Validazione Protocollo PSIU
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Agda
        uses: wenkokke/setup-agda@v2
        with:
          agda-version: '2.6.4'

      - name: Run Validation
        # Usiamo il nome esatto del file qui
        run: agda --no-libraries PSIU_Protocol.agda

      - name: Check Status
        if: success()
        run: echo "Protocollo PSIU validato al 100% con successo!"

