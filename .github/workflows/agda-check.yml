name: PSIU-Protocol-Validation

on: [push, pull_request]

jobs:
  validate-hott:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Agda
        run: |
          sudo apt-get update
          sudo apt-get install -y agda

      - name: Download Agda Standard Library
        run: |
          git clone --depth 1 https://github.com ~/agda-stdlib
          mkdir -p ~/.agda
          echo "$HOME/agda-stdlib/standard-library.agda-lib" > ~/.agda/libraries
          echo "standard-library" > ~/.agda/defaults

      - name: Formal Verification (No Postulates)
        run: |
          # Ora Agda userà la libreria scaricata. 
          # Se passa questo con --safe, la prova è blindata.
          agda --safe PSIU_Protocol.agda

