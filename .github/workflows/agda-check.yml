name: PSIU-Protocol-Final-Verification

on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Agda (Pure Environment)
        uses: wenkokke/setup-agda@v2
        with:
          agda-version: '2.6.4.3'
          agda-stdlib-version: '2.0'

      - name: Execute Formal Proof
        run: |
          # Questo comando verifica il file specifico del tuo modello
          # Se passa con --safe, la prova è definitiva al 100%
          agda --safe --without-K PSIU_Protocol.agda
