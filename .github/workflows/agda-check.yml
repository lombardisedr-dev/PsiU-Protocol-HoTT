name: PSIU-Protocol-Validation

on: [push, pull_request]

jobs:
  validate-hott:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Agda
        run: |
          sudo apt-get update
          sudo apt-get install -y agda

      - name: Download Agda Standard Library
        run: |
          # URL completo per evitare l'errore 128
          git clone --depth 1 https://github.com $HOME/agda-stdlib
          mkdir -p $HOME/.agda
          echo "$HOME/agda-stdlib/standard-library.agda-lib" > $HOME/.agda/libraries
          echo "standard-library" > $HOME/.agda/defaults

      - name: Formal Verification (No Postulates)
        run: |
          # Verifica finale: se questo passa, la teoria è dimostrata senza postulati
          agda --safe PSIU_Protocol.agda
