name: PSIU-Protocol-Final-Verification

on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Agda & Stdlib
        uses: wenkokke/setup-agda@v2
        with:
          agda-version: '2.6.4.3'
          agda-stdlib-version: '2.0'

      - name: 3. Create Library Path
        run: |
          mkdir -p ~/.agda
          echo "standard-library" > ~/.agda/defaults

      - name: 4. Execute Formal Proof (Final Verdict)
        run: |
          # -i . cerca il file PSIU_Protocol.agda nella cartella corrente
          # -l standard-library abilita l'import di Data.Nat e Level
          agda --safe --without-K -i . -l standard-library PSIU_Protocol.agda
