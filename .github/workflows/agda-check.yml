name: PSIU-Protocol-Validation

on: [push, pull_request]

jobs:
  validate-hott:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Agda
        run: |
          sudo apt-get update
          sudo apt-get install -y agda agda-stdlib

      - name: Setup Libraries
        run: |
          mkdir -p ~/.agda
          echo "/usr/share/agda-stdlib/standard-library.agda-lib" > ~/.agda/libraries
          echo "standard-library" > ~/.agda/defaults

      - name: Formal Verification (No Postulates)
        run: |
          # Il flag --safe impedisce l'uso di postulati. 
          # Se compila, la prova è assoluta.
          agda --safe PSIU_Protocol.agda

