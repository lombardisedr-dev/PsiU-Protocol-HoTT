name: PSIU-Protocol-Final-Verification

on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Agda & Stdlib
        uses: wenkokke/setup-agda@v2
        with:
          agda-version: '2.6.4.3'
          agda-stdlib-version: '2.0'

      - name: 3. Execute Formal Proof
        run: |
          # -i . forza Agda a guardare nella cartella del repository
          # -l standard-library carica le dipendenze esterne
          agda --safe --without-K -i . -l standard-library PSIU_Protocol.agda
