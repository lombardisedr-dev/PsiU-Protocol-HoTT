name: Diagnostica-Agda
on: [push, pull_request]

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Verifica Ambiente
        run: |
          echo "Verifica file presenti:"
          ls -R
          
      - name: Prova Installazione Semplice
        run: |
          sudo apt-get update
          sudo apt-get install -y agda
          
      - name: Esegui Agda
        run: agda --version || echo "Agda non installato"

