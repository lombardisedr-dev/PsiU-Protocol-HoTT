name: Agda-Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Agda and Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y agda libtinfo5

      - name: Run Agda Typecheck
        run: agda agdatest.agda
