name: Agda-Check

on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Agda (Pre-compiled)
        uses: wenkokke/setup-agda@v2
        with:
          agda-version: '2.6.4'

      - name: Run Agda Typecheck
        run: agda --no-libraries agdatest.agda

        
