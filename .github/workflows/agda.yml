name: Agda-Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Agda
        # Usa l'azione ufficiale per evitare errori di apt-get
        uses: wenkokke/setup-agda@v2
        with:
          agda-version: '2.6.4'

      - name: Run Agda Typecheck
        run: agda --no-libraries agdatest.agda

