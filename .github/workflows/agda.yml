name: Agda-Check

on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Agda
        run: |
          sudo apt-get update
          sudo apt-get install -y agda libtinfo5

      - name: Run Agda Typecheck
        # Usiamo --library-file per dire ad Agda di non cercare nulla fuori dal file stesso
        run: |
          touch empty.agda-lib
          agda --no-default-libraries --no-libraries agdatest.agda
