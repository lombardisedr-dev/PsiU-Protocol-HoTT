name: Agda-Check

on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Agda
        run: |
          sudo apt-get update
          sudo apt-get install -y agda libtinfo5

      - name: Run Agda Typecheck
        # Usiamo il flag --no-libraries per validare il file in isolamento totale
        run: agda --no-libraries agdatest.agda
