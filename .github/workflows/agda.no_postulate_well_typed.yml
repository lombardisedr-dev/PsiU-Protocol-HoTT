name: Agda No Postulate & Well Typed

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: "Check: No Postulates & Well-Typed"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Agda
        uses: wenkokke/setup-agda@v2
        with:
          agda-version: '2.6.4'
          agda-stdlib-version: '2.0'

      - name: Run Strict Validation
        # --safe: fallisce se trova 'postulate' o problemi di terminazione
        # --no-libraries: assicura che il file sia autocontenuto o usi solo i path specificati
        run: agda --safe --no-libraries PSIU_Protocol.agda

      - name: Success Message
        if: success()
        run: echo "Validazione superata: il codice è puramente costruttivo e ben tipizzato."
