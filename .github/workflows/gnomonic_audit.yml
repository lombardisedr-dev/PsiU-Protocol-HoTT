name: Validazione Scientifica Gnomonic Ratio

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: 

jobs:
  execute-gnomonic-audit:
    runs-on: ubuntu-latest

    steps:
    # 1. Scarica il codice dal tuo repository
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Configura l'ambiente R ufficiale
    - name: Configura l'ambiente R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: 'release'

    # 3. Installazione pulita tramite i repository predefiniti del sistema
    - name: Installazione PsiUEngineRL
      run: |
        # Usiamo i repository stabili già configurati dall'ambiente Linux
        install.packages("PsiUEngineRL")
      shell: Rscript {0}

    # 4. Esecuzione dello script R nello stesso ambiente di runtime
    - name: Esecuzione Audit Gnomonic Ratio
      run: |
        source("gnomonic_ratio_validation.R")
      shell: Rscript {0}
