name: Validazione Scientifica Gnomonic Ratio

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: 

jobs:
  execute-gnomonic-audit:
    runs-on: ubuntu-latest

    steps:
    # 1. Scarica il codice dal tuo repository
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Configura l'ambiente R ufficiale
    - name: Configura l'ambiente R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: 'release'

    # 3. Installazione ed Esecuzione Unificata (Risolve il problema dei path isolati)
    - name: Installazione Dipendenze ed Esecuzione Audit
      run: |
        # Definizione repository specchio
        options(repos = c(CRAN = "https://r-project.org"))
        
        # Installazione gestore remotes
        if (!requireNamespace("remotes", quietly = TRUE)) {
          install.packages("remotes")
        }
        
        # Installazione fail-safe del pacchetto ufficiale
        tryCatch(
          install.packages("PsiUEngineRL"),
          error = function(e) {
            message("Mirror primario non sincronizzato. Download dal mirror ufficiale CRAN GitHub...")
            remotes::install_github("cran/PsiUEngineRL")
          }
        )
        
        # Esecuzione diretta dello script di validazione nello stesso ambiente
        source("gnomonic_ratio_validation.R")
      shell: Rscript {0}
