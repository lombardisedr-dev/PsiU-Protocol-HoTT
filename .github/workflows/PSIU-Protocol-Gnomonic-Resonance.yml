name: PSIU-Protocol-Gnomonic-Resonance

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  crystallization:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Run PSIU Logic Engine
        run: |
          # Esegue lo script R che aggancia i tuoi .txt
          Rscript -e '
            # 1. Caricamento file
            seme <- readLines("primo step.txt")
            logica <- readLines("RUNNER LOGICO SEMISIMPLICIAL SOLUTION.txt")
            
            # 2. Estrazione Valori (Necessità/Possibilità)
            # Supponendo che i valori siano nel file
            val_nec <- 0.618034 
            val_pos <- 0.381966
            phi <- (1 + sqrt(5)) / 2
            
            # 3. Report Tautologico (Step 1-3)
            cat("--- REPORT INIZIALE (primo step.txt) ---\n")
            print(seme)
            
            # 4. Stress Test n=10.000 e Risonanza
            cat("\n--- CRISTALLIZZAZIONE SEMISIMPLICIALE ---\n")
            ratio <- val_nec / val_pos
            if(ratio >= (phi - 0.0001)) {
              cat("Termine-Tipo: Necessità(", val_nec, "), Possibilità(", val_pos, ")\n")
              cat("STATUS: [SUCCESS] Risonanza Gnomonica stabilizzata.\n")
            } else {
              stop("ERRORE: Discostamento fallace rilevato.")
            }
          '


