name: " Validazione Scientifica Integrale e Definitiva"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  formal-verification:
    name: " Verifica Formale Globale del Protocollo PsiU"
    runs-on: ubuntu-latest

    steps:
      - name: " Step 1: Recupero Sorgenti"
        uses: actions/checkout@v4

      - name: " Step 2: Configurazione Ambiente Agda con Standard Library"
        uses: wenkokke/setup-agda@v2
        with:
          agda-version: '2.6.4'
          agda-stdlib-version: '2.0' # Gestisce l'installazione nativa senza bisogno di agda-libraries

      - name: " Step 3: Audit di Purezza e Sicurezza Matematica"
        run: |
          agda --cubical --safe Psi_Protocol_implementation_2.agda

      - name: " Step 4: Test di Onestà Logica (Tentativo di Violazione)"
        run: |
          echo "module Breach where" > Breach.agda
          echo "open import PSIU_Protocol" >> Breach.agda
          echo "open import Data.Empty" >> Breach.agda
          echo "breach : ⊥" >> Breach.agda
          echo "breach = Filtro-λ (anomalia-flusso (λ x → x))" >> Breach.agda
          
          if agda --cubical Breach.agda; then
            echo "VERDETTO FALLIMENTARE: Il protocollo ha accettato il falso logico!"
            exit 1
          else
            echo "VERDETTO DI SUCCESSO: Il protocollo ha respinto la violazione logica."
            exit 0
          fi

      - name: " Step 5: Test di Canonicità Forte (Verifica Computazionale)"
        run: |
          echo "module Canon where" > Canon.agda
          echo "open import PSIU_Protocol" >> Canon.agda
          echo "open import Relation.Binary.PropositionalEquality" >> Canon.agda
          echo "test-canon : Calcolo-Flusso-Reale ≡ 42" >> Canon.agda
          echo "test-canon = refl" >> Canon.agda
          
          if agda --cubical Canon.agda; then
            echo "VERDETTO DI SUCCESSO: Canonicità forte verificata (Output = 42)."
            exit 0
          else
            echo "VERDETTO FALLIMENTARE: Calcolo bloccato."
            exit 1
          fi

      - name: " Step 6: Test di Estensione di Kan (Risoluzione SST)"
        run: |
          echo "module KanTest where" > KanTest.agda
          echo "open import PSIU_Protocol" >> KanTest.agda
          echo "open import Data.Nat" >> KanTest.agda
          echo "open import Relation.Binary.PropositionalEquality" >> KanTest.agda
          echo "universality : (n : ℕ) → RiempitoreKan zero ℕ" >> KanTest.agda
          echo "universality n = record { riempimento-cubico = λ i φ u base → base .out }" >> KanTest.agda
          
          if agda --cubical --safe KanTest.agda; then
            echo "VERDETTO DI SUCCESSO: Geometria semisimpliciale saturata verificata."
            exit 0
          else
            echo "VERDETTO FALLIMENTARE: Errore geometrico."
            exit 1
          fi

      - name: " VERDETTO FINALE DEL COMPILATORE"
        run: |
          echo "================================================================"
          echo "IL PROTOCOLLO PSIU HA SUPERATO TUTTI I RIGOROSI CONTROLLI HOTT"
          echo "================================================================"

