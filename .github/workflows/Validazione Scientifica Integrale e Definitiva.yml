name: " INTEGRITY: Psi_Protocol Audit"

on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  negative-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: wenkokke/setup-agda@v2
        with:
          agda-version: '2.6.4'
          agda-stdlib-version: '2.0'

      - name: " Compilazione formale del Protocollo"
        # Rimuoviamo temporaneamente il flag --safe nel test per isolare i singoli errori di tipo
        run: |
          agda --cubical Psi_Protocol_implementation_2.agda
