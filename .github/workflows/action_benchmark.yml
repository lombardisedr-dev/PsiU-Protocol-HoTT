name: PsiU-Scientific-Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice locale
        uses: actions/checkout@v3

      - name: Setup R professionale
        uses: r-lib/actions/setup-r@v2

      - name: Installazione dipendenze tecniche
        run: |
          install.packages(c("microbenchmark", "testthat", "remotes"))
        shell: Rscript {0}

      - name: Esecuzione Action Benchmark dal MAIN
        # Qui diciamo a R di leggere il file che è nella root del repo
        run: |
          source("action_benchmark.R")
        shell: Rscript {0}

      - name: Validazione Logica (test_validation.R)
        run: |
          source("test_validation.R")
        shell: Rscript {0}
