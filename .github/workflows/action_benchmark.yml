name: PsiU-Scientific-Validation

on:
  push:
    branches: [ main ]

jobs:
  validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Esecuzione Test Diretta (MAIN)
        run: |
          # Invece di library(), leggiamo direttamente i TUOI file nel repo
          source("R/engine.R") 
          source("action_benchmark.R")
          source("test_validation.R")
        shell: Rscript {0}
