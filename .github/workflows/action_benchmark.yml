name: PsiU Action Benchmark

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install dependencies
        run: |
          install.packages(c("microbenchmark", "testthat"))
        shell: Rscript {0}

      - name: Run Action Benchmark
        run: |
          source("action_benchmark.R")
        shell: Rscript {0}
