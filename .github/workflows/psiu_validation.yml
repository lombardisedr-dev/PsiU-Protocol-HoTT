name: PsiU-Protocol Absolute Validation

on: [push, workflow_dispatch]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Esecuzione Totale
        # Usiamo un unico comando shell per assicurarci che i file siano 'vicini'
        run: |
          Rscript "The Truth Seeker.R"
          ls -l  # Questo ci dirà nei log se il CSV è stato creato davvero
          Rscript engine.R
          
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: verdetto-finale
          path: |
            psi_u_resonance_map.png
            results_full_analysis.csv
