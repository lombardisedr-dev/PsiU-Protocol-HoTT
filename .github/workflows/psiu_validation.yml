name: PsiU-Protocol Validation (The Truth Seeker)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Ti permette di farlo partire a mano dalla scheda Actions

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Configurazione ambiente R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Generazione Dataset e Validazione
        # Eseguiamo tutto in un unico step per essere sicuri che i file siano nella stessa cartella
        run: |
          Rscript "The Truth Seeker.R"
          
      - name: Verifica e Archiviazione Risultati
        uses: actions/upload-artifact@v4
        with:
          name: report-validazione-finale
          path: |
            psi_u_resonance_map.png
            results_full_analysis.csv
            input_potential.csv
