name: PsiU-Protocol Validation (The Truth Seeker)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Permette di lanciarlo a mano per test

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Configurazione R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Esecuzione Validazione Scientifica
        run: Rscript "The Truth Seeker.R"

      - name: Archiviazione Risultati (Mappe e Report)
        uses: actions/upload-artifact@v4
        with:
          name: validazione-risultati
          path: |
            psi_u_resonance_map.png
            results_full_analysis.csv
