name: Real Duel - Trust Benchmark

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  scientific-test:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout del codice
        uses: actions/checkout@v4

      - name: 2. Configurazione Ambiente R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true 

      - name: 3. Installazione Librerie (Mirror Cloud)
        run: |
          install.packages(c("isotree", "dbscan"), repos="https://r-project.org")
        shell: Rscript {0}

      - name: 4. Esecuzione Benchmark REALE
        # FORZIAMO l'esecuzione dello script corretto
        run: Rscript real_dataset_trust.R

      - name: 5. Archiviazione Risultati
        uses: actions/upload-artifact@v4
        with:
          name: real-trust-results
          path: |
            report_finale.txt
        if: always()
