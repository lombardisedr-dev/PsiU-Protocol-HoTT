name: "AUDIT: Cross-Version Interoperability"
on: [push]

jobs:
  agda-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Testa su versioni diverse per garantire che PSIU non dipenda da bug del compilatore
        agda-ver: ['2.6.3', '2.6.4']
        node-ver: ['24'] 
    steps:
      - uses: actions/checkout@v4
      - uses: wenkokke/setup-agda@v2
        with:
          agda-version: ${{ matrix.agda-ver }}
          node-version: ${{ matrix.node-ver }}
      
      - name: "Check Protocol Stability"
        run: agda --cubical Psi_Protocol_implementation_2.agda
