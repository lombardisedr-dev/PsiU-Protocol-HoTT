name: Validazione Scientifica PSIU - TOTAL

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  total-verification:
    name: Verifica Formale Semisimpliciale
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Agda
        uses: wenkokke/setup-agda@v2
        with:
          agda-version: 'latest'
          agda-stdlib-version: 'recommended'

      - name: Formally Verify PSIU_Protocol
        run: |
          agda +RTS -M6G -RTS \
               --without-K \
               --safe \
               PSIU_Protocol.agda

      - name: Induction & Infinity Check
        if: success()
        run: |
          echo "VALIDAZIONE TOTALE COMPLETATA."
          echo "Il file PSIU_Protocol.agda è Well-Typed."
          echo "La coerenza dei tipi semisimpliciali è garantita per induzione."
