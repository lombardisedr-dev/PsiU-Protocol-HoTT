name: "validazione-scientifica"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  # Forza l'uso di Node 24 per evitare warning di deprecazione
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  formal-verification:
    name: "@lombardisedr-dev: Global Protocol Audit"
    runs-on: ubuntu-latest

    steps:
      - name: "Step 1: Recupero Sorgenti"
        uses: actions/checkout@v4

      - name: "Step 2: Configurazione Ambiente Agda"
        uses: wenkokke/setup-agda@v2
        with:
          agda-version: '2.6.4'
          agda-stdlib-version: '2.0'

      - name: "Step 3: Audit di Purezza e Sicurezza Matematica"
        # Verifica che il protocollo sia --safe e privo di postulati contraddittori
        run: |
          agda --cubical --safe Psi_Protocol_implementation.agda

      - name: "Step 4: Test di Onestà Logica (Non-Contraddizione)"
        # Tenta di forzare una violazione nel Filtro-λ. Deve fallire la compilazione (exit 0).
        run: |
          echo "module Breach where" > Breach.agda
          echo "open import Psi_Protocol_implementation" >> Breach.agda
          echo "open import Data.Empty" >> Breach.agda
          echo "breach : ⊥" >> Breach.agda
          echo "breach = Filtro-λ (anomalia-flusso (λ ()))" >> Breach.agda
          if agda --cubical Breach.agda; then
            echo "VERDETTO FALLIMENTARE: Il protocollo è inconsistente!"
            exit 1
          else
            echo "VERDETTO DI SUCCESSO: Integrità logica confermata."
            exit 0
          fi

      - name: "Step 5: Test di Canonicità Forte (Riduzione a 42)"
        # Verifica che il calcolo omotopico converga correttamente al valore test.
        run: |
          echo "module Canon where" > Canon.agda
          echo "open import Psi_Protocol_implementation" >> Canon.agda
          echo "test-canon : Calcolo-Flusso-Reale ≡ tautologia-identita 42" >> Canon.agda
          echo "test-canon = refl" >> Canon.agda
          agda --cubical Canon.agda

      - name: "Step 6: Test di Estensione Universale (SST-Hierarchy)"
        # Valida la stabilità geometrica della gerarchia induttiva.
        run: |
          echo "module KanTest where" > KanTest.agda
          echo "open import Psi_Protocol_implementation" >> KanTest.agda
          echo "open import Data.Nat" >> KanTest.agda
          echo "universality : (n : ℕ) → SST-Level n" >> KanTest.agda
          echo "universality n = PSIU-Inductive-Hierarchy n" >> KanTest.agda
          agda --cubical --safe KanTest.agda

      - name: "VERDETTO FINALE"
        run: |
          echo "================================================================"
          echo "PROTOCOLLO PSIU: VALIDAZIONE SCIENTIFICA COMPLETATA CON SUCCESSO"
          echo "================================================================"
