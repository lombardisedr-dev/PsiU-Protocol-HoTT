      - name: "AUDIT: Zero-Postulate & Full-Completion"
        run: |
          echo "Analisi di integrità strutturale..."
          
          # Cerca la parola 'postulate': se la trova, il verdetto deve essere ROSSO
          if grep -q "postulate" PSIU_Protocol.agda; then
            echo "FALLIMENTO: Trovati postulati. La soluzione non è integrale."
            exit 1
          fi

          # Cerca fori '?' o '{!!}': se li trova, la prova è incompleta
          if grep -q "?" PSIU_Protocol.agda || grep -q "{!!}" PSIU_Protocol.agda; then
            echo "FALLIMENTO: La prova contiene fori o metavariabili non risolte."
            exit 1
          fi

          # Verifica la Riduzione (Computing to Normal Form)
          # Chiediamo ad Agda di calcolare il valore reale. Se non è '42', fallisce.
          echo "open import PSIU_Protocol" > CheckCompute.agda
          echo "open import io-native-standard-out" >> CheckCompute.agda # se disponibile
          
          RESULT=$(agda --compute-normal-form --cubical <<< "Calcolo-Flusso-Reale")
          if [[ "$RESULT" == *"42"* ]]; then
            echo "SUCCESSO: Canonicità verificata. Il protocollo calcola valori puri."
          else
            echo "FALLIMENTO: Il termine non riduce a un valore canonico."
            exit 1
          fi
