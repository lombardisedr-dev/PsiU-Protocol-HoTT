name: Agda Formal Verification
on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Agda
        uses: wenkokke/setup-agda@v2
        with:
          agda-version: '2.6.4'

      - name: Run Validation
        # Le virgolette sono fondamentali qui per via degli spazi
        run: agda --no-libraries "Agda Formal Verification.agda"


