name: Agda Formal Verification
on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Agda
        uses: wenkokke/setup-agda@v2
        with:
          agda-version: '2.6.4'

      - name: Run Validation
        # Questo comando valida il tuo protocollo nel file agdatest.agda
        run: agda --no-libraries agdatest.agda

      - name: Check Status
        if: success()
        run: echo "Protocollo validato al 100% con successo!"

