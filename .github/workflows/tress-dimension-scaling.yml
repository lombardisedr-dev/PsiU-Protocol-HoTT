name: "STRESS-TEST: Dimensional Scaling Audit"
on: [push]

jobs:
  scale-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dimension: [10, 20, 50, 100]
    steps:
      - uses: actions/checkout@v4
      - uses: wenkokke/setup-agda@v2
        with:
          agda-version: '2.6.4' # Assicurati che sia la versione corretta
      
      - name: "Run Dimensional Validation (n=${{ matrix.dimension }})"
        run: |
          # Genera un file di test temporaneo per la dimensione specifica
          echo "module DimensionTest${{ matrix.dimension }} where" > Test.agda
          echo "open import PSIU_Protocol" >> Test.agda
          echo "_ : PSIU-Inductive-Hierarchy ${{ matrix.dimension }} ≡ PSIU-Inductive-Hierarchy ${{ matrix.dimension }}" >> Test.agda
          echo "_ = refl" >> Test.agda
          agda --cubical Test.agda
