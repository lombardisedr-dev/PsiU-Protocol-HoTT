name: Scientific Duel Benchmark

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  run-benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Installa i pacchetti necessari
        run: |
          install.packages(c("isolationForest", "dbscan"), repos="https://r-project.org")
        shell: Rscript {0}

      - name: Esegui il Duello Scientifico Real-Time
        run: |
          source("duello.R")
        shell: Rscript {0}

      - name: Archivia il Report e il Grafico Finale
        uses: actions/upload-artifact@v4
        with:
          name: scientific-duel-results
          path: |
            report_finale.txt
            duello_scientifico.png
          retention-days: 7
