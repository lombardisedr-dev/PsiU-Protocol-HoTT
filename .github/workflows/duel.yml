name: Scientific Duel Benchmark

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  run-benchmark:
    runs-on: ubuntu-latest

    steps:
      # 1. Scarica il codice dal repository in modo standard
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configura l'ambiente R sul server Linux
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # 3. Installa i pacchetti stabili dai server cloud CRAN ufficiali
      - name: Installa i pacchetti necessari
        run: |
          install.packages(c("isotree", "dbscan"), repos="https://r-project.org")
        shell: Rscript {0}

      # 4. Verifica di sicurezza per tracciare la reale presenza dei file
      - name: Diagnostica file e directory
        run: |
          cat("Cartella attuale di lavoro:", getwd(), "\n")
          cat("File presenti nella cartella:\n")
          print(list.files())
        shell: Rscript {0}

      # 5. Esegue il Duello Scientifico reale e genera i file dei risultati
      - name: Esegui il Duello Scientifico Real-Time
        run: |
          if (file.exists("duello.R")) {
            source("duello.R")
          } else {
            stop("ERRORE: Il file 'duello.R' non si trova nella root del progetto. Controlla la struttura delle cartelle!")
          }
        shell: Rscript {0}

      # 6. Salva il report e il grafico PNG nella sezione "Artifacts" scaricabile
      - name: Archivia il Report e il Grafico Finale
        uses: actions/upload-artifact@v4
        with:
          name: scientific-duel-results
          path: |
            report_finale.txt
            duello_scientifico.png
          retention-days: 7
