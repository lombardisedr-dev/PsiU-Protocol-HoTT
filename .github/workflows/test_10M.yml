name: Test 10M PsiU CRAN
on: workflow_dispatch
jobs:
  run-10M:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          
      - name: Install from CRAN
        run: |
          Rscript -e 'install.packages(c("MotoreModale", "tictoc"), repos="https://cloud.r-project.org")'
          Rscript -e 'packageVersion("MotoreModale")'
        
      - name: Run 10M PsiU Test
        run: Rscript test_10M.R
        
      - uses: actions/upload-artifact@v4
        with:
          name: risultati-10M-PsiU-CRAN
          path: risultati_10M_PsiU_CRAN.csv
