name: Test 10M
on: workflow_dispatch
jobs:
  run-10M:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - run: Rscript test_10M.R
      - uses: actions/upload-artifact@v4
        with:
          name: risultati-10M
          path: risultati_10M.csv
