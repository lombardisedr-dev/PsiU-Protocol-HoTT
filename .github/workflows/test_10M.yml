name: Test 10M PsiUEngineRL CRAN
on: workflow_dispatch
jobs:
  run-10M:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'  # CRAN dice R >= 4.1.0, release va bene
          use-public-rspm: true
          
      - name: Install PsiUEngineRL from CRAN
        run: |
          Rscript -e 'install.packages(c("PsiUEngineRL", "tictoc"), repos="https://cloud.r-project.org")'
          Rscript -e 'packageVersion("PsiUEngineRL")'
        
      - name: Run 10M test
        run: Rscript test_10M.R
        
      - uses: actions/upload-artifact@v4
        with:
          name: risultati-10M-PsiUEngineRL
          path: risultati_10M_PsiUEngineRL.csv
