name: Agda Formal Verification Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  verify-psi-protocol:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Setup Agda Environment
      uses: wenkokke/setup-agda@v2
      with:
        agda-version: '2.6.4.3'

    - name: Download Agda Standard Library
      run: |
        mkdir -p ~/.agda
        curl -L github.com -o stdlib.tar.gz
        tar -xzf stdlib.tar.gz
        mv agda-stdlib-2.0 ~/.agda/agda-stdlib
        echo "~/.agda/agda-stdlib/standard-library.agda-lib" >> ~/.agda/libraries
        echo "standard-library" >> ~/.agda/defaults

    - name: Execute Strict Type-Checking (0 Objections)
      run: |
        agda Psi_Protocol_implementation_2.agda
