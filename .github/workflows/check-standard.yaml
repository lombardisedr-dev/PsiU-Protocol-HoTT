      - name: Esecuzione dei 4 Test (Idrico, Sanità, Quantum, Smart Cities)
        run: |
          # Carichiamo le funzioni Action
          source("R/actions.R")
          library(testthat)
          
          # Cerchiamo il file ignorando la struttura delle cartelle
          files <- list.files(recursive = TRUE, pattern = "test-action\\.R$", full.names = TRUE)
          
          if (length(files) > 0) {
            message("Eseguo il test trovato in: ", files[1])
            test_file(files[1])
          } else {
            stop("ERRORE: Nessun file test-action.R trovato nel repository!")
          }
        shell: Rscript {0}
