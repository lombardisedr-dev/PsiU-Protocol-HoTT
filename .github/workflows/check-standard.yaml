on: [push, pull_request]
name: Validazione-Scientifica-Protocollo

jobs:
  test-onesto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2

      - name: Installa Engine dal CRAN
        run: install.packages(c("PsiUEngineRL", "testthat"))
        shell: Rscript {0}

      - name: Esecuzione Onesta dei 4 Test
        run: |
          source("R/actions.R")
          library(testthat)
          # Questo comando trova il test sia che si chiami test-action che test-actions
          test_dir("tests/testthat/") 
        shell: Rscript {0}

          
