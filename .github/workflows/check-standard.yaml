on: [push, pull_request]
name: Validazione-Scientifica-PsiU

jobs:
  test-onesto:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del Codice
        uses: actions/checkout@v4

      - name: Setup di R
        uses: r-lib/actions/setup-r@v2

      - name: Installazione Engine (CRAN) e Testthat
        run: |
          install.packages(c("PsiUEngineRL", "testthat"))
        shell: Rscript {0}

      - name: Esecuzione Onesta dei 4 Test
        run: |
          # 1. Carichiamo le funzioni
          source("R/actions.R")
          library(testthat)
          library(PsiUEngineRL)
          
          # 2. DEBUG: Vediamo cosa c'è nel repository (onestà totale)
          message("--- ELENCO FILE NEL REPOSITORY ---")
          print(list.files(recursive = TRUE))
          
          # 3. Caccia al test (cerchiamo qualsiasi file che contenga 'test' e '.R')
          file_test <- list.files(recursive = TRUE, pattern = "test.*\\.R$", ignore.case = TRUE, full.names = TRUE)
          
          # Escludiamo le Action stesse dalla ricerca dei test
          file_test <- file_test[!grepl("actions.R|engine.R", file_test)]

          if (length(file_test) > 0) {
            message("Trovato file di test: ", file_test[1])
            test_file(file_test[1])
          } else {
            stop("ERRORE: Nessun file di test trovato! Controlla se lo hai caricato su GitHub.")
          }
        shell: Rscript {0}
