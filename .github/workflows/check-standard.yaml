on: [push, pull_request]

name: Validazione-Scientifica-Protocollo

jobs:
  test-onesto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - name: Installa Engine dal CRAN e Testthat
        run: |
          install.packages(c("PsiUEngineRL", "testthat", "remotes"))
        shell: Rscript {0}

      - name: Esecuzione Onesta dei 4 Test (Idrico, Sanità, Quantum, Smart Cities)
        run: |
          # Carichiamo le tue funzioni in memoria
          source("R/actions.R")
          # Lanciamo il file di test
          library(testthat)
          test_file("tests/testthat/test-actions.R")
        shell: Rscript {0}

          
