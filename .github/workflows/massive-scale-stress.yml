name: "STRESS-TEST: Massive Scale (n=100)"
on: [push]

jobs:
  heavy-computation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: wenkokke/setup-agda@v2
        with:
          agda-version: '2.6.4'
          node-version: '24' # Pulizia warning inclusa

      - name: "Extreme Dimensional Normalization"
        run: |
          echo "module MassiveScale where" > Massive.agda
          echo "open import PSIU_Protocol" >> Massive.agda
          echo "open import Data.Nat" >> Massive.agda
          # Questo obbliga il riduttore di Agda a calcolare n=100 passi di induzione
          echo "test-100 : PSIU-Inductive-Hierarchy 100 ≡ PSIU-Inductive-Hierarchy 100" >> Massive.agda
          echo "test-100 = refl" >> Massive.agda
          
          # Esecuzione con monitoraggio della memoria
          /usr/bin/time -v agda --cubical Massive.agda
