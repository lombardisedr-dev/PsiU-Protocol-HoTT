      - name: "FINAL AUDIT: Univalent Transport (J-Rule Consistency)"
        run: |
          echo "Verifica del Trasporto di Identità..."
          
          # Creiamo un test che forza il trasporto di una proprietà complessa
          # attraverso l'univalenza del protocollo.
          echo "module JRuleTest where" > JRuleTest.agda
          echo "open import PSIU_Protocol" >> JRuleTest.agda
          echo "open import Cubical.Foundations.Prelude" >> JRuleTest.agda
          echo "open import Cubical.Foundations.Transport" >> JRuleTest.agda
          
          # Test: trasportare un dato attraverso l'eguaglianza FiguraSatura ≡ FlussoModale
          # Se il trasporto non è computazionale, Agda si bloccherà o darà errore.
          echo "test-j : (d : Dato-Test-4D) → transport univalenza-protocollo (crea-figura d) ≡ crea-flusso d" >> JRuleTest.agda
          echo "test-j d = refl" >> JRuleTest.agda

          if agda --cubical JRuleTest.agda; then
            echo "VERDETTO DEFINITIVO: Il protocollo rispetta la J-Rule. L'univalenza è computazionale."
            exit 0
          else
            echo "FALLIMENTO: L'univalenza è solo dichiarativa, non computazionale."
            exit 1
          fi
