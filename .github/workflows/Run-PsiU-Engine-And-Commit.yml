name: Run-PsiU-Engine-And-Commit
on: [push, workflow_dispatch]
jobs:
  run-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Fondamentale per permettere la scrittura sul repo
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
      
      - name: Execute Engine
        run: Rscript engine.R
      
      - name: Commit and Push Results
        run: |
          git config --global user.name "PsiU-Bot"
          git config --global user.email "bot@psiu-protocol.io"
          git add results_*.csv
          git commit -m "Aggiornamento automatico Nucleo Tautologico [skip ci]" || echo "Nessuna modifica rilevata"
          git push
