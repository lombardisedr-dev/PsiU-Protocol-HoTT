name: Esecuzione Test Protocollo PsiU

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: r-lib/actions/setup-r@v2
      
      - name: Esecuzione Test R
        run: Rscript test_protocol.R
        
      - name: Archiviazione Risultati
        uses: actions/upload-artifact@v3
        with:
          name: risultati-protocollo
          path: results_*.csv
