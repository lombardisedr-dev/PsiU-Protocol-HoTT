name: run_tests

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Accesso al Codice
        uses: actions/checkout@v4

      - name: Configurazione R
        uses: r-lib/actions/setup-r@v2

      - name: Esecuzione Test
        run: Rscript test_protocol.R

      - name: Archiviazione Risultati
        uses: actions/upload-artifact@v4
        with:
          name: risultati-protocollo
          path: results_*.csv

